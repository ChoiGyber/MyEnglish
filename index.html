<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0b1f">
<title>영문법 퀘스트 — 중학영문법 RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   영문법 퀘스트 — 디자인 시스템
   ========================================================= */
:root{
  --bg-0:#070716;
  --bg-1:#0e0e2a;
  --bg-2:#1a1148;
  --ink:#f5f3ff;
  --ink-mute:#b6b3d6;
  --line:rgba(255,255,255,.12);

  --p1:#ff4ecd;   /* 핑크 */
  --p2:#7c5bff;   /* 퍼플 */
  --p3:#34d8ff;   /* 시안 */
  --p4:#ffd54a;   /* 골드 */
  --p5:#36ff9a;   /* 그린 */
  --p6:#ff6b6b;   /* 코랄 */

  --good:#36ff9a;
  --good-dark:#0aa86a;
  --bad:#ff5d8f;
  --bad-dark:#b6204c;

  --grad-hero: linear-gradient(135deg,#ff4ecd 0%,#7c5bff 50%,#34d8ff 100%);
  --grad-good: linear-gradient(135deg,#36ff9a,#06b6d4);
  --grad-bad : linear-gradient(135deg,#ff6b6b,#ff4ecd);
  --grad-gold: linear-gradient(135deg,#ffd54a,#ff7e3a);

  --shadow-soft:0 10px 30px rgba(0,0,0,.35);
  --shadow-glow:0 0 0 4px rgba(124,91,255,.25),0 12px 40px rgba(124,91,255,.45);

  --r-sm:10px;
  --r-md:16px;
  --r-lg:24px;
  --r-xl:32px;

  --f-display:'Black Han Sans','Jua','Noto Sans KR',sans-serif;
  --f-fun:'Jua','Gowun Dodum','Noto Sans KR',sans-serif;
  --f-body:'Noto Sans KR',sans-serif;
  --f-en:'Fredoka','Noto Sans KR',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--f-body);
  color:var(--ink);
  background:
    radial-gradient(1200px 800px at 10% -10%,rgba(255,78,205,.18),transparent 60%),
    radial-gradient(1000px 700px at 110% 10%,rgba(52,216,255,.18),transparent 60%),
    radial-gradient(900px 600px at 50% 110%,rgba(255,213,74,.15),transparent 60%),
    linear-gradient(180deg,var(--bg-0) 0%,var(--bg-1) 60%,var(--bg-2) 100%);
  background-attachment:fixed;
  overflow-x:hidden;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
ul{list-style:none}

/* === 떠다니는 별 배경 === */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.stars span{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:#fff;opacity:.6;
  animation:twinkle 4s ease-in-out infinite;
  box-shadow:0 0 6px #fff;
}
@keyframes twinkle{
  0%,100%{opacity:.2;transform:scale(.6)}
  50%{opacity:1;transform:scale(1.4)}
}

/* === 공통 컨테이너 === */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* === 헤더(상단 HUD) === */
.hud{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(14px) saturate(160%);
  background:rgba(10,8,30,.55);
  border-bottom:1px solid var(--line);
  padding:10px 14px;
  display:flex;align-items:center;gap:12px;
}
.hud-brand{display:flex;align-items:center;gap:10px;font-family:var(--f-display);font-size:20px;letter-spacing:.02em}
.hud-brand .logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--grad-hero);
  display:grid;place-items:center;font-size:20px;
  box-shadow:0 6px 20px rgba(124,91,255,.6);
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-3px) rotate(2deg)}}

.hud-stats{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:99px;
  background:rgba(255,255,255,.08);border:1px solid var(--line);
  font-family:var(--f-fun);font-size:14px;
}
.chip .ic{font-size:16px}
.chip.lvl{background:linear-gradient(135deg,rgba(124,91,255,.4),rgba(255,78,205,.4));border-color:rgba(255,255,255,.2)}
.chip.xp{min-width:120px}
.chip .bar{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;position:relative}
.chip .bar i{position:absolute;inset:0;width:0%;background:var(--grad-hero);border-radius:99px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.chip.gold{background:linear-gradient(135deg,rgba(255,213,74,.3),rgba(255,126,58,.3));border-color:rgba(255,213,74,.5)}
.chip.streak{background:linear-gradient(135deg,rgba(255,78,205,.35),rgba(255,107,107,.35));border-color:rgba(255,107,107,.55)}

.btn-mute{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid var(--line);
  display:grid;place-items:center;font-size:16px;
}
.btn-mute:hover{background:rgba(255,255,255,.16)}

/* === 화면 전환 === */
.screen{display:none;animation:screenIn .45s cubic-bezier(.2,.8,.2,1) both}
.screen.active{display:block}
@keyframes screenIn{
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to{opacity:1;transform:none}
}

/* ===== 메인 월드맵 ===== */
.world{padding:22px 14px 120px;max-width:980px;margin:0 auto}
.hero{
  position:relative;
  margin:8px 0 28px;
  padding:28px 24px 24px;
  border-radius:var(--r-xl);
  background:
    radial-gradient(600px 200px at 20% 0%,rgba(255,213,74,.25),transparent 60%),
    radial-gradient(500px 200px at 100% 100%,rgba(52,216,255,.25),transparent 60%),
    linear-gradient(135deg,rgba(255,78,205,.18),rgba(124,91,255,.18));
  border:1px solid rgba(255,255,255,.14);
  overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:-2px;border-radius:inherit;padding:2px;
  background:var(--grad-hero);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:.7;pointer-events:none;
}
.hero h1{font-family:var(--f-display);font-size:clamp(28px,7vw,46px);letter-spacing:.02em;line-height:1.05}
.hero h1 .acc{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(255,213,74,.5)}
.hero p{margin-top:8px;color:var(--ink-mute);font-family:var(--f-fun);font-size:15px}
.hero-cta{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}

.btn-primary{
  padding:14px 22px;border-radius:14px;font-family:var(--f-display);font-size:18px;letter-spacing:.04em;
  background:var(--grad-hero);color:#fff;
  box-shadow:var(--shadow-glow);
  position:relative;overflow:hidden;
  transition:transform .15s ease;
}
.btn-primary:hover{transform:translateY(-2px) scale(1.02)}
.btn-primary:active{transform:scale(.98)}
.btn-primary::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.4) 50%,transparent 70%);
  transform:translateX(-100%);
  animation:shine 3s ease-in-out infinite;
}
@keyframes shine{0%{transform:translateX(-100%)}60%{transform:translateX(120%)}100%{transform:translateX(120%)}}

.btn-ghost{
  padding:12px 18px;border-radius:14px;font-family:var(--f-fun);font-size:15px;
  background:rgba(255,255,255,.08);border:1px solid var(--line);
}
.btn-ghost:hover{background:rgba(255,255,255,.16)}

/* 캐릭터 */
.mascot{
  position:absolute;right:20px;bottom:-6px;
  width:120px;height:120px;
  filter:drop-shadow(0 12px 24px rgba(0,0,0,.4));
  animation:mascotIdle 3.5s ease-in-out infinite;
}
@keyframes mascotIdle{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-6px) rotate(3deg)}
}
@media (max-width:560px){.mascot{width:90px;height:90px;right:8px}}

/* 진도 큰 띠 */
.world-progress{
  display:flex;align-items:center;gap:14px;
  margin:10px 4px 22px;padding:14px 16px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);
  border-radius:var(--r-lg);
}
.world-progress .pbar{flex:1;height:12px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;position:relative}
.world-progress .pbar i{position:absolute;inset:0;width:0;background:var(--grad-good);border-radius:99px;transition:width 1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(54,255,154,.6)}
.world-progress .ptxt{font-family:var(--f-display);font-size:18px;color:var(--p4)}

/* 스테이지 그리드 */
.stages{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
}
.stage{
  position:relative;
  aspect-ratio:1/1.05;
  border-radius:var(--r-lg);
  padding:14px;
  background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border:1px solid var(--line);
  display:flex;flex-direction:column;justify-content:space-between;
  text-align:left;
  transition:transform .2s ease,box-shadow .2s ease;
  overflow:hidden;
}
.stage::before{
  content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1.5px;
  background:var(--g,linear-gradient(135deg,#7c5bff,#ff4ecd));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:.55;pointer-events:none;
}
.stage:hover{transform:translateY(-4px) scale(1.02)}
.stage:hover::before{opacity:1}
.stage .num{font-family:var(--f-display);font-size:14px;color:var(--ink-mute);letter-spacing:.05em}
.stage .emoji{font-size:38px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.stage .title{font-family:var(--f-fun);font-size:16px;line-height:1.25;margin-top:6px}
.stage .stars{display:flex;gap:2px;margin-top:6px;position:static;height:auto}
.stage .stars span{
  position:static;width:14px;height:14px;background:transparent;box-shadow:none;animation:none;opacity:1;
  -webkit-mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l2.9 6.5 7.1.7-5.4 4.8 1.7 7-6.3-3.8-6.3 3.8 1.7-7L2 9.2l7.1-.7z"/></svg>') center/contain no-repeat;
          mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l2.9 6.5 7.1.7-5.4 4.8 1.7 7-6.3-3.8-6.3 3.8 1.7-7L2 9.2l7.1-.7z"/></svg>') center/contain no-repeat;
  background:rgba(255,255,255,.18);
}
.stage .stars span.on{background:linear-gradient(135deg,#ffd54a,#ff7e3a);box-shadow:0 0 8px rgba(255,213,74,.7)}

.stage.locked{filter:grayscale(.7) brightness(.7);cursor:not-allowed}
.stage.locked:hover{transform:none}
.stage.locked .lock{
  position:absolute;inset:0;display:grid;place-items:center;
  background:rgba(0,0,0,.35);border-radius:inherit;font-size:34px;
}
.stage.cleared::after{
  content:"✔";position:absolute;top:8px;right:10px;
  width:26px;height:26px;border-radius:50%;
  background:var(--grad-good);color:#031;display:grid;place-items:center;font-weight:900;font-size:14px;
  box-shadow:0 4px 12px rgba(54,255,154,.5);
}

/* 단원 컬러 매핑 */
.s-1 {--g:linear-gradient(135deg,#ff4ecd,#7c5bff)}
.s-2 {--g:linear-gradient(135deg,#34d8ff,#7c5bff)}
.s-3 {--g:linear-gradient(135deg,#ffd54a,#ff6b6b)}
.s-4 {--g:linear-gradient(135deg,#36ff9a,#34d8ff)}
.s-5 {--g:linear-gradient(135deg,#ff7e3a,#ffd54a)}
.s-6 {--g:linear-gradient(135deg,#ff4ecd,#ffd54a)}
.s-7 {--g:linear-gradient(135deg,#7c5bff,#34d8ff)}
.s-8 {--g:linear-gradient(135deg,#36ff9a,#ffd54a)}
.s-9 {--g:linear-gradient(135deg,#ff6b6b,#7c5bff)}
.s-10{--g:linear-gradient(135deg,#34d8ff,#36ff9a)}
.s-11{--g:linear-gradient(135deg,#ffd54a,#7c5bff)}
.s-12{--g:linear-gradient(135deg,#ff4ecd,#36ff9a)}

.section-title{
  font-family:var(--f-display);font-size:22px;letter-spacing:.02em;
  margin:24px 6px 12px;display:flex;align-items:center;gap:10px;
}
.section-title .dot{width:10px;height:10px;border-radius:50%;background:var(--grad-hero);box-shadow:0 0 12px rgba(255,78,205,.7)}

/* 배지 그리드 */
.badges{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;
  margin-top:8px;
}
.badge{
  padding:14px 10px;border-radius:18px;
  background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--line);text-align:center;
  position:relative;overflow:hidden;
  transition:transform .2s;
}
.badge.earned{
  background:linear-gradient(160deg,rgba(255,213,74,.18),rgba(255,78,205,.18));
  border-color:rgba(255,213,74,.4);
  box-shadow:0 0 20px rgba(255,213,74,.2);
}
.badge.earned:hover{transform:translateY(-3px) rotate(-2deg)}
.badge .ic{font-size:34px;display:block;filter:drop-shadow(0 4px 6px rgba(0,0,0,.4))}
.badge.locked .ic{filter:grayscale(1) brightness(.5)}
.badge .nm{font-family:var(--f-fun);font-size:13px;margin-top:4px;line-height:1.3}
.badge .ds{font-size:11px;color:var(--ink-mute);margin-top:2px}

/* ===== 학습 화면 ===== */
.lesson{padding:14px;max-width:760px;margin:0 auto;min-height:calc(100vh - 60px)}
.lesson-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.btn-back{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid var(--line);
  display:grid;place-items:center;font-size:18px;
}
.lesson-title{font-family:var(--f-display);font-size:20px;letter-spacing:.02em}
.lesson-sub{font-family:var(--f-fun);font-size:13px;color:var(--ink-mute)}

.slide-track{position:relative;min-height:60vh}
.slide{
  display:none;
  padding:22px;
  border-radius:var(--r-xl);
  background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:1px solid var(--line);
  animation:slideIn .4s cubic-bezier(.2,.8,.2,1) both;
  box-shadow:var(--shadow-soft);
}
.slide.active{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}

.slide h2{font-family:var(--f-display);font-size:clamp(22px,5.5vw,30px);line-height:1.15;margin-bottom:6px}
.slide h2 .acc{background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;color:transparent}
.slide .subt{color:var(--ink-mute);font-family:var(--f-fun);font-size:14px;margin-bottom:14px}
.slide .body{font-size:16px}
.slide .body p{margin:8px 0}
.slide .key{
  margin:14px 0;padding:14px 16px;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,213,74,.16),rgba(255,126,58,.12));
  border:1px solid rgba(255,213,74,.3);
}
.slide .key b{color:var(--p4)}
.slide .ex{
  margin:10px 0;padding:12px 14px;border-radius:12px;
  background:rgba(52,216,255,.08);border:1px dashed rgba(52,216,255,.4);
  font-family:var(--f-en);font-size:16px;
}
.slide .ex .ko{display:block;font-family:var(--f-body);color:var(--ink-mute);font-size:13px;margin-top:4px}
.slide .table{
  margin:12px 0;border-radius:14px;overflow:hidden;border:1px solid var(--line);
  background:rgba(0,0,0,.18);
}
.slide .table .row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.slide .table .row > div{background:rgba(255,255,255,.03);padding:10px 12px;font-size:14px}
.slide .table .head{font-family:var(--f-fun);color:var(--p4);background:rgba(255,213,74,.08)!important}

.dot-nav{
  display:flex;justify-content:center;gap:8px;margin:14px 0;
}
.dot-nav span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:.2s}
.dot-nav span.on{background:var(--p1);width:24px;border-radius:99px;box-shadow:0 0 10px rgba(255,78,205,.6)}

.slide-controls{display:flex;gap:10px;justify-content:space-between;margin-top:8px}
.slide-controls .btn-ghost,.slide-controls .btn-primary{flex:1}

/* ===== 퀴즈 화면 ===== */
.quiz{padding:14px;max-width:760px;margin:0 auto}
.quiz-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.quiz-head .qbar{
  flex:1;margin:0 14px;height:10px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;position:relative;
}
.quiz-head .qbar i{position:absolute;inset:0;width:0;background:var(--grad-good);border-radius:99px;transition:width .5s ease;box-shadow:0 0 12px rgba(54,255,154,.6)}
.quiz-head .qcount{font-family:var(--f-display);font-size:16px;color:var(--p3)}

.combo{
  position:fixed;top:70px;right:14px;z-index:40;
  font-family:var(--f-display);font-size:18px;
  padding:8px 14px;border-radius:99px;
  background:linear-gradient(135deg,rgba(255,78,205,.7),rgba(255,107,107,.7));
  box-shadow:0 8px 24px rgba(255,78,205,.5);
  display:none;align-items:center;gap:8px;
  animation:comboPop .35s cubic-bezier(.2,.8,.2,1) both;
}
.combo.show{display:flex}
@keyframes comboPop{
  0%{transform:scale(.5) rotate(-15deg);opacity:0}
  60%{transform:scale(1.15) rotate(5deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}

.qcard{
  padding:24px;border-radius:var(--r-xl);
  background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);
  position:relative;
  animation:slideIn .35s cubic-bezier(.2,.8,.2,1) both;
}
.qcard.shake{animation:shake .5s}
@keyframes shake{
  10%,90%{transform:translateX(-3px) rotate(-.6deg)}
  20%,80%{transform:translateX(5px) rotate(.6deg)}
  30%,50%,70%{transform:translateX(-7px) rotate(-1deg)}
  40%,60%{transform:translateX(7px) rotate(1deg)}
}
.qcard .qtype{
  display:inline-block;font-family:var(--f-fun);font-size:12px;
  padding:4px 10px;border-radius:99px;background:rgba(124,91,255,.25);border:1px solid rgba(124,91,255,.5);
  color:#dcd4ff;margin-bottom:10px;
}
.qcard .qprompt{font-family:var(--f-fun);font-size:18px;line-height:1.5;margin-bottom:6px}
.qcard .qsentence{
  font-family:var(--f-en);font-size:22px;line-height:1.5;
  background:rgba(0,0,0,.25);padding:14px 16px;border-radius:14px;border:1px dashed rgba(255,255,255,.2);
  margin:10px 0 14px;text-align:center;
}
.qcard .blank{
  display:inline-block;min-width:80px;padding:0 8px;border-bottom:3px solid var(--p1);
  text-align:center;color:var(--p1);
}
.qcard .qopts{display:grid;gap:10px;grid-template-columns:1fr;margin-top:10px}
@media (min-width:520px){.qcard .qopts{grid-template-columns:1fr 1fr}}
.qopt{
  padding:14px 16px;border-radius:14px;text-align:left;
  background:rgba(255,255,255,.06);border:1.5px solid var(--line);
  font-family:var(--f-en);font-size:17px;line-height:1.4;
  display:flex;align-items:center;gap:10px;
  transition:all .15s;
}
.qopt:hover{background:rgba(255,255,255,.12);transform:translateY(-2px)}
.qopt .key{
  width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  background:rgba(124,91,255,.4);font-family:var(--f-display);font-size:14px;flex-shrink:0;
}
.qopt.correct{background:linear-gradient(135deg,rgba(54,255,154,.3),rgba(6,182,212,.3));border-color:var(--good);box-shadow:0 0 24px rgba(54,255,154,.4)}
.qopt.correct .key{background:var(--good);color:#003}
.qopt.wrong{background:linear-gradient(135deg,rgba(255,93,143,.3),rgba(255,78,205,.2));border-color:var(--bad);box-shadow:0 0 24px rgba(255,93,143,.4)}
.qopt.wrong .key{background:var(--bad);color:#300}
.qopt.disabled{pointer-events:none;opacity:.55}

.qfb{
  margin-top:14px;padding:14px 16px;border-radius:14px;
  display:none;animation:slideIn .3s ease;
}
.qfb.show{display:block}
.qfb.ok{background:linear-gradient(135deg,rgba(54,255,154,.18),rgba(6,182,212,.12));border:1px solid rgba(54,255,154,.4)}
.qfb.no{background:linear-gradient(135deg,rgba(255,93,143,.18),rgba(255,78,205,.12));border:1px solid rgba(255,93,143,.4)}
.qfb .h{font-family:var(--f-display);font-size:18px;display:flex;align-items:center;gap:8px}
.qfb .ans{font-family:var(--f-en);margin-top:6px;color:var(--p4);font-size:16px}
.qfb .why{margin-top:4px;font-size:14px;color:var(--ink-mute);line-height:1.55}

.q-actions{display:flex;gap:10px;margin-top:14px}
.q-actions .btn-primary,.q-actions .btn-ghost{flex:1}

/* ===== 결과 화면 ===== */
.result{padding:24px 14px 80px;max-width:560px;margin:0 auto;text-align:center}
.result .big{
  font-family:var(--f-display);font-size:clamp(36px,9vw,56px);line-height:1;
  background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 40px rgba(255,213,74,.4);
  animation:bigPop .6s cubic-bezier(.2,1.5,.2,1) both;
}
@keyframes bigPop{
  0%{transform:scale(.4) rotate(-20deg);opacity:0}
  60%{transform:scale(1.1) rotate(4deg)}
  100%{transform:scale(1);opacity:1}
}
.result .stars-big{display:flex;justify-content:center;gap:10px;margin:14px 0}
.result .stars-big span{
  width:54px;height:54px;
  -webkit-mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l2.9 6.5 7.1.7-5.4 4.8 1.7 7-6.3-3.8-6.3 3.8 1.7-7L2 9.2l7.1-.7z"/></svg>') center/contain no-repeat;
          mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l2.9 6.5 7.1.7-5.4 4.8 1.7 7-6.3-3.8-6.3 3.8 1.7-7L2 9.2l7.1-.7z"/></svg>') center/contain no-repeat;
  background:rgba(255,255,255,.18);
  transform:scale(0);
}
.result .stars-big span.on{
  background:linear-gradient(135deg,#ffd54a,#ff7e3a);
  filter:drop-shadow(0 6px 14px rgba(255,213,74,.7));
  animation:starPop .6s cubic-bezier(.2,1.6,.3,1) both;
}
.result .stars-big span.on:nth-child(1){animation-delay:.2s}
.result .stars-big span.on:nth-child(2){animation-delay:.5s}
.result .stars-big span.on:nth-child(3){animation-delay:.8s}
@keyframes starPop{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.3) rotate(20deg)}100%{transform:scale(1) rotate(0)}}

.result .summary{
  margin:18px 0;padding:18px;border-radius:var(--r-lg);
  background:rgba(255,255,255,.06);border:1px solid var(--line);
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.result .summary .item{padding:8px}
.result .summary .lbl{font-size:12px;color:var(--ink-mute);font-family:var(--f-fun)}
.result .summary .val{font-family:var(--f-display);font-size:24px;margin-top:2px}
.result .summary .val.good{color:var(--good)}
.result .summary .val.gold{color:var(--p4)}

.result .new-badge{
  margin:14px auto;padding:14px 18px;border-radius:18px;display:inline-flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(255,213,74,.25),rgba(255,78,205,.25));
  border:1px solid rgba(255,213,74,.5);
  animation:badgeWobble 1.2s ease-in-out infinite;
}
@keyframes badgeWobble{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.04)}}
.result .new-badge .ic{font-size:34px}
.result .new-badge .nm{font-family:var(--f-display);font-size:16px}
.result .new-badge .ds{font-size:12px;color:var(--ink-mute);margin-top:2px}

.result-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.result-actions .btn-primary,.result-actions .btn-ghost{padding:14px 20px}

/* ===== 떠오르는 +XP, 콤보 ===== */
.float-text{
  position:fixed;z-index:100;pointer-events:none;
  font-family:var(--f-display);font-size:28px;
  text-shadow:0 4px 12px rgba(0,0,0,.5);
  animation:floatUp 1.3s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes floatUp{
  0%{transform:translate(-50%,0) scale(.6);opacity:0}
  20%{transform:translate(-50%,-30px) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-100px) scale(1);opacity:0}
}
.float-text.gold{color:var(--p4)}
.float-text.green{color:var(--good)}
.float-text.pink{color:var(--p1)}

/* 풀스크린 깜빡 */
.flash{
  position:fixed;inset:0;z-index:90;pointer-events:none;
  opacity:0;transition:opacity .15s;
}
.flash.ok{background:radial-gradient(circle,rgba(54,255,154,.4),transparent 70%);animation:flashAni .6s ease-out}
.flash.no{background:radial-gradient(circle,rgba(255,93,143,.4),transparent 70%);animation:flashAni .6s ease-out}
@keyframes flashAni{0%{opacity:0}20%{opacity:1}100%{opacity:0}}

/* canvas 폭죽 */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:80}

/* 시작 버튼 강조 펄스 */
.pulse{animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,78,205,.6),0 12px 40px rgba(124,91,255,.45)}
  50%{box-shadow:0 0 0 18px rgba(255,78,205,0),0 12px 40px rgba(124,91,255,.45)}
}

/* 스크롤바 */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:linear-gradient(135deg,#7c5bff,#ff4ecd);border-radius:99px}

/* 스플래시(처음 시작) */
.splash{
  position:fixed;inset:0;z-index:200;
  display:grid;place-items:center;
  background:radial-gradient(circle at 50% 40%,#1a1148 0%,#070716 70%);
  transition:opacity .8s ease, visibility .8s;
}
.splash.hide{opacity:0;visibility:hidden}
.splash .logo-big{
  font-family:var(--f-display);font-size:clamp(40px,11vw,72px);
  background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:logoIn 1s cubic-bezier(.2,.8,.2,1) both;
  letter-spacing:.04em;text-align:center;
}
@keyframes logoIn{from{transform:scale(.6);opacity:0;letter-spacing:.2em}to{transform:scale(1);opacity:1;letter-spacing:.04em}}

/* 토스트 */
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  padding:12px 20px;border-radius:99px;background:rgba(20,16,40,.92);border:1px solid var(--line);
  font-family:var(--f-fun);font-size:14px;z-index:150;
  opacity:0;transition:opacity .3s,transform .3s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

/* 화폐 단위 표시 */
.chip.gold .unit{font-size:10px;color:#ffd54a;font-weight:700;margin-left:2px;letter-spacing:.5px}

/* HUD 도움말 버튼 */
.btn-help{
  background:linear-gradient(135deg,rgba(124,91,255,.4),rgba(52,216,255,.3));
  border:1px solid rgba(124,91,255,.6);
  color:#fff;font-size:14px;width:32px;height:32px;border-radius:50%;
  display:grid;place-items:center;cursor:pointer;font-weight:900;
  transition:transform .18s ease;
}
.btn-help:hover{transform:scale(1.1)}

/* 공유 버튼 (카톡) */
.btn-kakao{
  background:linear-gradient(135deg,#ffe200,#ffd54a);color:#1a1148;
  font-family:var(--f-display);font-size:15px;letter-spacing:.5px;
  padding:12px 20px;border-radius:99px;border:none;cursor:pointer;
  box-shadow:0 6px 16px rgba(255,213,74,.35),inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .18s ease;display:inline-flex;align-items:center;gap:8px;
}
.btn-kakao:hover{transform:translateY(-2px)}
.btn-kakao:active{transform:translateY(0)}

/* 환영 모달 / 안내 모달 */
.modal-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:16px;
  animation:fadeIn .3s ease both;
}
.modal-mask.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:linear-gradient(160deg,#1a1148,#0e0e2a);
  border:2px solid transparent;
  background-clip:padding-box;
  border-radius:var(--r-xl);
  padding:28px 24px;max-width:460px;width:100%;
  position:relative;
  box-shadow:0 30px 80px rgba(124,91,255,.4),0 0 0 1px rgba(255,255,255,.1);
  animation:modalIn .4s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes modalIn{from{transform:scale(.85) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal::before{
  content:"";position:absolute;inset:-2px;border-radius:var(--r-xl);
  background:var(--grad-hero);z-index:-1;
}
.modal .m-emoji{font-size:54px;text-align:center;margin-bottom:8px;
  animation:bounce 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.modal .m-title{
  font-family:var(--f-display);font-size:26px;text-align:center;margin-bottom:12px;
  background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.modal .m-body{
  font-family:var(--f-fun);font-size:16px;line-height:1.7;color:var(--ink);
  text-align:center;margin-bottom:18px;
}
.modal .m-body b{color:#ffd54a;font-weight:700}
.modal .m-points{
  background:rgba(255,213,74,.1);border:1px dashed rgba(255,213,74,.4);
  border-radius:var(--r-md);padding:12px 14px;margin:14px 0;
  font-family:var(--f-fun);font-size:14px;color:var(--ink-mute);text-align:left;
}
.modal .m-points b{color:#ffd54a}
.modal .m-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal .m-close{
  position:absolute;top:10px;right:12px;background:transparent;border:none;
  color:var(--ink-mute);font-size:22px;cursor:pointer;width:34px;height:34px;
  border-radius:50%;transition:background .18s;
}
.modal .m-close:hover{background:rgba(255,255,255,.1);color:#fff}

/* 복습 배너 (월드맵) */
.review-banner{
  background:linear-gradient(135deg,rgba(255,107,107,.2),rgba(255,213,74,.15));
  border:1px solid rgba(255,107,107,.4);
  border-radius:var(--r-lg);
  padding:16px 18px;margin:16px 0;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:space-between;
}
.review-banner .rb-title{font-family:var(--f-display);font-size:18px;color:#ff6b6b}
.review-banner .rb-sub{font-family:var(--f-fun);font-size:13px;color:var(--ink-mute);margin-top:2px}
.review-banner .rb-sub b{color:#ffd54a}

/* 퀴즈 카드 — 복습 문제 표시 */
.qcard.review{
  border-color:rgba(255,107,107,.5);
  box-shadow:var(--shadow-soft),0 0 0 2px rgba(255,107,107,.3);
}
.qcard .qtype.review{
  background:rgba(255,107,107,.25);border-color:rgba(255,107,107,.6);color:#ffcfcf;
}

/* 반응형 */
@media (max-width:560px){
  .hud{padding:8px 10px}
  .hud-brand{font-size:16px}
  .hud-brand .logo{width:30px;height:30px;font-size:16px}
  .chip{padding:5px 10px;font-size:12px}
  .stages{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .stage{padding:12px;aspect-ratio:1/1.1}
  .stage .emoji{font-size:30px}
  .qcard{padding:18px}
  .qcard .qsentence{font-size:18px}
  .qopt{padding:12px 14px;font-size:15px}
  .modal{padding:22px 18px}
  .modal .m-title{font-size:22px}
  .modal .m-body{font-size:15px}
}
</style>
</head>
<body>
<div class="splash" id="splash">
  <div class="logo-big">⚔️ 영문법<br>퀘스트 ⚔️</div>
</div>

<div class="stars" id="starsBg"></div>
<canvas id="confetti"></canvas>
<div class="flash" id="flash"></div>
<div class="combo" id="combo"><span class="ic">🔥</span><span id="comboNum">2</span><span style="font-size:14px;font-family:var(--f-fun)">콤보!</span></div>

<div class="app">
  <header class="hud">
    <div class="hud-brand">
      <div class="logo">⚔️</div>
      <div>
        <div>영문법퀘스트</div>
        <div style="font-size:11px;color:var(--ink-mute);font-family:var(--f-fun);font-weight:400">중학영문법 RPG</div>
      </div>
    </div>
    <div class="hud-stats">
      <div class="chip lvl"><span class="ic">🎖️</span> Lv.<span id="lvl">1</span></div>
      <div class="chip xp"><span class="ic">⭐</span><div class="bar"><i id="xpBar"></i></div><span id="xpTxt" style="font-size:11px;color:var(--ink-mute)">0</span></div>
      <div class="chip gold" title="지유원 — 현금과 교환 가능"><span class="ic">💰</span><span id="gold">0</span><span class="unit">JY</span></div>
      <div class="chip streak"><span class="ic">🔥</span><span id="streak">0</span></div>
      <button class="btn-help" id="btnHelp" title="안내 보기">?</button>
      <button class="btn-mute" id="btnMute" title="음소거">🔊</button>
    </div>
  </header>

  <main>
    <!-- ============ 메인 월드맵 ============ -->
    <section class="screen active" id="screenWorld">
      <div class="world">
        <div class="hero">
          <h1>안녕, <span class="acc">모험가</span>!<br>오늘도 <span class="acc">영문법 퀘스트</span> 시작하자!</h1>
          <p>12개의 단원을 깨면서 별을 모으고, 콤보를 터뜨리고, 영문법 마스터가 되어보자 🔥</p>
          <div class="hero-cta">
            <button class="btn-primary pulse" id="btnContinue">▶ 계속하기</button>
            <button class="btn-ghost" id="btnReset">🔄 처음부터</button>
          </div>
          <svg class="mascot" viewBox="0 0 200 200">
            <defs>
              <radialGradient id="bg" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#ffd54a"/>
                <stop offset="100%" stop-color="#ff7e3a"/>
              </radialGradient>
            </defs>
            <circle cx="100" cy="100" r="78" fill="url(#bg)" stroke="#fff" stroke-width="4"/>
            <circle cx="74" cy="92" r="10" fill="#1a1148"/>
            <circle cx="126" cy="92" r="10" fill="#1a1148"/>
            <circle cx="78" cy="88" r="3" fill="#fff"/>
            <circle cx="130" cy="88" r="3" fill="#fff"/>
            <path d="M70 130 Q100 158 130 130" stroke="#1a1148" stroke-width="6" fill="none" stroke-linecap="round"/>
            <circle cx="55" cy="118" r="8" fill="#ff4ecd" opacity=".55"/>
            <circle cx="145" cy="118" r="8" fill="#ff4ecd" opacity=".55"/>
            <path d="M30 60 L60 30 L70 50 Z" fill="#7c5bff"/>
            <path d="M170 60 L140 30 L130 50 Z" fill="#7c5bff"/>
          </svg>
        </div>

        <div class="world-progress">
          <div>
            <div style="font-family:var(--f-display);font-size:18px">🌟 모험 진도</div>
            <div style="font-size:12px;color:var(--ink-mute);font-family:var(--f-fun)">단원을 모두 깨면 영문법 마스터!</div>
          </div>
          <div class="pbar"><i id="worldBar"></i></div>
          <div class="ptxt"><span id="worldDone">0</span>/12</div>
        </div>

        <h2 class="section-title"><span class="dot"></span> 스테이지 선택</h2>
        <div class="stages" id="stagesGrid"></div>

        <h2 class="section-title"><span class="dot"></span> 배지 컬렉션</h2>
        <div class="badges" id="badgesGrid"></div>

        <div style="margin-top:32px;text-align:center;color:var(--ink-mute);font-size:12px;font-family:var(--f-fun)">
          🎯 한 번 더 풀고 싶다면 다시 도전 가능해요. 별을 더 받을 수 있어!
        </div>
      </div>
    </section>

    <!-- ============ 학습 슬라이드 ============ -->
    <section class="screen" id="screenLesson">
      <div class="lesson">
        <div class="lesson-head">
          <button class="btn-back" id="btnBackLesson">←</button>
          <div>
            <div class="lesson-title" id="lessonTitle">단원</div>
            <div class="lesson-sub">개념을 보고 → 퀴즈로 마스터!</div>
          </div>
        </div>
        <div class="dot-nav" id="dotNav"></div>
        <div class="slide-track" id="slideTrack"></div>
        <div class="slide-controls">
          <button class="btn-ghost" id="btnPrev">◀ 이전</button>
          <button class="btn-primary" id="btnNext">다음 ▶</button>
        </div>
      </div>
    </section>

    <!-- ============ 퀴즈 ============ -->
    <section class="screen" id="screenQuiz">
      <div class="quiz">
        <div class="quiz-head">
          <button class="btn-back" id="btnBackQuiz">←</button>
          <div class="qbar"><i id="qBar"></i></div>
          <div class="qcount"><span id="qNum">1</span>/<span id="qTotal">5</span></div>
        </div>
        <div id="qHolder"></div>
      </div>
    </section>

    <!-- ============ 결과 ============ -->
    <section class="screen" id="screenResult">
      <div class="result">
        <div class="big" id="resTitle">완벽해!</div>
        <div class="stars-big" id="resStars">
          <span></span><span></span><span></span>
        </div>
        <div class="summary">
          <div class="item"><div class="lbl">정답</div><div class="val good"><span id="resCorrect">0</span>/<span id="resTotal">5</span></div></div>
          <div class="item"><div class="lbl">획득 XP</div><div class="val">+<span id="resXp">0</span></div></div>
          <div class="item"><div class="lbl">획득 골드</div><div class="val gold">+<span id="resGold">0</span></div></div>
        </div>
        <div id="resBadge"></div>
        <div class="result-actions">
          <button class="btn-primary" id="btnNextStage">다음 스테이지 ▶</button>
          <button class="btn-ghost" id="btnRetry">🔁 한번 더</button>
          <button class="btn-ghost" id="btnHome">🏠 월드맵으로</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ============================================================
   영문법 퀘스트 — 데이터 + 엔진
   ============================================================ */

/* ---------- 데이터: 12 단원 ---------- */
const CHAPTERS = [
{
  id:1,emoji:"🦄",color:"#ff4ecd",title:"be동사 (am / are / is)",
  slides:[
    {h:'be동사가 뭐야?',
     body:`<p>be동사는 "<b>~이다 / ~있다</b>"라는 뜻이야. 주어가 누구냐에 따라 모양이 바뀌어!</p>
     <div class="key">🔑 <b>I → am</b>, <b>You/We/They → are</b>, <b>He/She/It → is</b></div>
     <div class="ex">I <b>am</b> a student.<span class="ko">나는 학생이다.</span></div>
     <div class="ex">She <b>is</b> kind.<span class="ko">그녀는 친절하다.</span></div>`},
    {h:'주어별 짝꿍 정리',
     body:`<p>아래 표만 외우면 끝!</p>
     <div class="table">
       <div class="row head"><div>주어</div><div>be동사</div></div>
       <div class="row"><div>I</div><div>am</div></div>
       <div class="row"><div>You / We / They</div><div>are</div></div>

    const raw=localStorage.getItem(STATE_KEY);
    if(!raw) return defaultState();
    const j=JSON.parse(raw);
    return Object.assign(defaultState(),j);
  }catch(e){return defaultState()}
}
function save(){localStorage.setItem(STATE_KEY,JSON.stringify(S))}

/* ---------- 사운드 (Web Audio) ---------- */
let actx=null;
function ac(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return actx}
function tone(freq,dur=.18,type="sine",vol=.18,delay=0){
  if(S.mute) return;
  const c=ac();if(!c) return;
  const t0=c.currentTime+delay;
  const o=c.createOscillator();const g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+.01);
  g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g);g.connect(c.destination);
  o.start(t0);o.stop(t0+dur+.02);
}
function sndCorrect(){
  // 3음 상승
  tone(660,.12,"triangle",.22,0);
  tone(880,.12,"triangle",.22,.10);
  tone(1320,.20,"triangle",.22,.20);
}
function sndWrong(){
  tone(220,.18,"sawtooth",.18,0);
  tone(160,.25,"sawtooth",.16,.12);
}
function sndClick(){tone(700,.05,"square",.06,0)}
function sndCombo(n){
  // 콤보 횟수 따라 음높이↑
  const base=520+n*60;
  tone(base,.10,"triangle",.22,0);
  tone(base*1.5,.14,"triangle",.22,.07);
}
function sndApplause(){
  if(S.mute) return;
  const c=ac();if(!c) return;
  // 화이트 노이즈로 박수 시뮬
  const dur=1.6;
  const buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++){
    const t=i/c.sampleRate;
    // 박수 펄스 8개
    let p=0;
    for(let k=0;k<10;k++){
      const tk=k*0.13+Math.random()*.02;
      const d=(t-tk)/.04;
      const w=Math.exp(-(d*d));
      p+=w*(Math.random()*2-1);
    }
    // 페이드 아웃
    data[i]=p*Math.exp(-t*1.4)*0.5;
  }
  const src=c.createBufferSource();src.buffer=buf;
  const g=c.createGain();g.gain.value=.4;
  // 약간 하이패스 느낌으로 BiquadFilter
  const f=c.createBiquadFilter();f.type="bandpass";f.frequency.value=2400;f.Q.value=.7;
  src.connect(f);f.connect(g);g.connect(c.destination);
  src.start();
}
function sndLevelUp(){
  tone(440,.14,"square",.18,0);
  tone(660,.14,"square",.18,.13);
  tone(880,.14,"square",.18,.26);
  tone(1320,.30,"square",.20,.39);
}
function sndUnlock(){
  tone(880,.10,"sine",.16,0);
  tone(660,.10,"sine",.16,.10);
  tone(990,.16,"sine",.18,.20);
}

/* ---------- 컨페티 (Canvas) ---------- */
const cfCanvas=document.getElementById("confetti");
const cfx=cfCanvas.getContext("2d");
let cfParts=[];let cfRunning=false;
function fitCanvas(){cfCanvas.width=innerWidth;cfCanvas.height=innerHeight}
addEventListener("resize",fitCanvas);fitCanvas();

function confetti(power=140,opts={}){
  const colors=opts.colors||["#ff4ecd","#7c5bff","#34d8ff","#ffd54a","#36ff9a","#ff6b6b"];
  const cx=opts.x ?? innerWidth/2;
  const cy=opts.y ?? innerHeight*0.35;
  for(let i=0;i<power;i++){
    const a=Math.random()*Math.PI*2;
    const sp=4+Math.random()*8;
    cfParts.push({
      x:cx,y:cy,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp - 4,
      g:0.18+Math.random()*.1,
      size:6+Math.random()*8,
      rot:Math.random()*360,vr:(Math.random()-.5)*16,
      color:colors[(Math.random()*colors.length)|0],
      life:1, type:Math.random()<.3?"circle":"rect"
    });
  }
  if(!cfRunning){cfRunning=true;requestAnimationFrame(cfTick)}
}
function cfTick(){
  cfx.clearRect(0,0,cfCanvas.width,cfCanvas.height);
  cfParts=cfParts.filter(p=>p.life>0);
  cfParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.vr;p.life-=.008;
    cfx.save();cfx.globalAlpha=Math.max(0,p.life);
    cfx.translate(p.x,p.y);cfx.rotate(p.rot*Math.PI/180);
    cfx.fillStyle=p.color;
    if(p.type==="circle"){cfx.beginPath();cfx.arc(0,0,p.size/2,0,Math.PI*2);cfx.fill()}
    else cfx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
    cfx.restore();
  });
  if(cfParts.length>0)requestAnimationFrame(cfTick);else cfRunning=false;
}

/* ---------- 별 배경 ---------- */
function spawnStars(){
  const c=document.getElementById("starsBg");
  c.innerHTML="";
  const n=window.innerWidth<600?40:80;
  for(let i=0;i<n;i++){
    const s=document.createElement("span");
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDelay=(Math.random()*4)+"s";
    s.style.transform=`scale(${.4+Math.random()*1.2})`;
    c.appendChild(s);
  }
}
spawnStars();

/* ---------- 화면 전환 ---------- */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---------- HUD 갱신 ---------- */
const xpForLevel=lv=>50+lv*40; // 레벨업 임계값
function refreshHUD(){
  document.getElementById("lvl").textContent=S.level;
  const need=xpForLevel(S.level);
  const pct=Math.min(100,(S.xp/need)*100);
  document.getElementById("xpBar").style.width=pct+"%";
  document.getElementById("xpTxt").textContent=`${S.xp}/${need}`;
  document.getElementById("gold").textContent=S.gold;
  document.getElementById("streak").textContent=S.streak;
  document.getElementById("btnMute").textContent=S.mute?"🔇":"🔊";
}
function gainXp(n){
  S.xp+=n;
  while(S.xp>=xpForLevel(S.level)){
    S.xp-=xpForLevel(S.level);
    S.level++;
    sndLevelUp();
    confetti(220,{colors:["#ffd54a","#ff7e3a","#ff4ecd"]});
    floatText(`LEVEL UP!`,innerWidth/2,160,"gold");
    toast(`레벨 ${S.level} 달성! 🎉`);
  }
  refreshHUD();save();
}
function gainGold(n){S.gold+=n;refreshHUD();save();checkBadges()}
function setStreak(n){S.streak=n;refreshHUD();save()}

/* ---------- 토스트 / 떠오르는 텍스트 ---------- */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}
function floatText(txt,x,y,cls=""){
  const e=document.createElement("div");
  e.className="float-text "+cls;
  e.textContent=txt;
  e.style.left=x+"px";e.style.top=y+"px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1400);
}
function flash(cls){
  const f=document.getElementById("flash");
  f.className="flash";void f.offsetWidth;f.className="flash "+cls;
  setTimeout(()=>{f.className="flash"},700);
}

/* ---------- 월드맵 ---------- */
function renderStages(){
  const grid=document.getElementById("stagesGrid");
  grid.innerHTML="";
  CHAPTERS.forEach((ch,i)=>{
    const st=S.stages[i];
    const prevCleared = i===0 ? true : S.stages[i-1].cleared;
    const locked = !prevCleared && !st.cleared;
    const el=document.createElement("button");
    el.className=`stage s-${ch.id}${locked?" locked":""}${st.cleared?" cleared":""}`;
    el.innerHTML=`
      <div>
        <div class="num">UNIT ${String(ch.id).padStart(2,"0")}</div>
        <div class="emoji">${ch.emoji}</div>
        <div class="title">${ch.title}</div>
      </div>
      <div class="stars">
        <span class="${st.stars>=1?"on":""}"></span>
        <span class="${st.stars>=2?"on":""}"></span>
        <span class="${st.stars>=3?"on":""}"></span>
      </div>
      ${locked?'<div class="lock">🔒</div>':''}
    `;
    el.onclick=()=>{
      sndClick();
      if(locked){toast("앞 단원을 먼저 깨야 해! 🔒");flash("no");return}
      enterLesson(i);
    };
    grid.appendChild(el);
  });
  // 진도 띠
  const done=S.stages.filter(s=>s.cleared).length;
  document.getElementById("worldDone").textContent=done;
  document.getElementById("worldBar").style.width=(done/12*100)+"%";
}

function renderBadges(){
  const g=document.getElementById("badgesGrid");
  g.innerHTML="";
  BADGES.forEach(b=>{
    const earned=!!S.badges[b.id];
    const el=document.createElement("div");
    el.className="badge "+(earned?"earned":"locked");
    el.innerHTML=`<span class="ic">${b.ic}</span><div class="nm">${b.nm}</div><div class="ds">${b.ds}</div>`;
    g.appendChild(el);
  });
}

function checkBadges(opts={}){
  const before=Object.assign({},S.badges);
  // first_step
  if(S.stages.some(s=>s.cleared))S.badges.first_step=true;
  // half_way
  if(S.stages.filter(s=>s.cleared).length>=6)S.badges.half_way=true;
  // all_clear
  if(S.stages.every(s=>s.cleared))S.badges.all_clear=true;
  // all_stars
  const stars=S.stages.reduce((a,b)=>a+b.stars,0);
  if(stars>=30)S.badges.all_stars=true;
  // gold
  if(S.gold>=500)S.badges.gold_rush=true;
  // perfect_5
  if(opts.perfect)S.badges.perfect_5=true;
  // combo
  if(opts.combo){
    if(opts.combo>=5)S.badges.combo_5=true;
    if(opts.combo>=10)S.badges.combo_10=true;
  }
  const newOnes=Object.keys(S.badges).filter(k=>!before[k]);
  save();renderBadges();
  return newOnes.map(id=>BADGES.find(b=>b.id===id)).filter(Boolean);
}

/* ---------- 학습 슬라이드 ---------- */
let curCh=0, curSlide=0;
function enterLesson(chIdx){
  curCh=chIdx;curSlide=0;
  const ch=CHAPTERS[chIdx];
  document.getElementById("lessonTitle").textContent=`${ch.emoji} ${ch.title}`;
  const track=document.getElementById("slideTrack");
  track.innerHTML="";
  ch.slides.forEach((sl,i)=>{
    const d=document.createElement("div");
    d.className="slide"+(i===0?" active":"");
    d.innerHTML=`<h2><span class="acc">${sl.h}</span></h2><div class="body">${sl.body}</div>`;
    track.appendChild(d);
  });
  // 닷
  const dn=document.getElementById("dotNav");
  dn.innerHTML="";
  ch.slides.forEach((_,i)=>{
    const s=document.createElement("span");if(i===0)s.classList.add("on");dn.appendChild(s);
  });
  document.getElementById("btnPrev").style.visibility="hidden";
  document.getElementById("btnNext").textContent="다음 ▶";
  show("screenLesson");
  sndClick();
}
function gotoSlide(i){
  const slides=document.querySelectorAll("#slideTrack .slide");
  if(i<0||i>=slides.length)return;
  slides[curSlide].classList.remove("active");
  curSlide=i;
  slides[i].classList.add("active");
  document.querySelectorAll("#dotNav span").forEach((s,k)=>s.classList.toggle("on",k===i));
  document.getElementById("btnPrev").style.visibility=i===0?"hidden":"visible";
  document.getElementById("btnNext").textContent=(i===slides.length-1)?"퀴즈 시작 ▶":"다음 ▶";
  sndClick();
}
document.getElementById("btnPrev").onclick=()=>gotoSlide(curSlide-1);
document.getElementById("btnNext").onclick=()=>{
  const total=document.querySelectorAll("#slideTrack .slide").length;
  if(curSlide<total-1)gotoSlide(curSlide+1);
  else startQuiz();
};
document.getElementById("btnBackLesson").onclick=()=>{sndClick();show("screenWorld")};

/* ---------- 퀴즈 엔진 ---------- */
let quizState=null; // {qIdx, correct, combo, answered}
function startQuiz(){
  const ch=CHAPTERS[curCh];
  quizState={qIdx:0,correct:0,combo:0,answered:false,maxCombo:0};
  document.getElementById("qTotal").textContent=ch.quiz.length;
  show("screenQuiz");
  renderQ();
}
function renderQ(){
  const ch=CHAPTERS[curCh];
  const q=ch.quiz[quizState.qIdx];
  document.getElementById("qNum").textContent=quizState.qIdx+1;
  document.getElementById("qBar").style.width=((quizState.qIdx)/ch.quiz.length*100)+"%";
  const holder=document.getElementById("qHolder");
  const keys=["A","B","C","D"];
  holder.innerHTML=`
    <div class="qcard" id="qcard">
      <div class="qtype">📝 ${q.type==="choice"?"객관식":"문제"}</div>
      <div class="qprompt">${q.p}</div>
      ${q.s?`<div class="qsentence">${q.s}</div>`:""}
      <div class="qopts">
        ${q.opts.map((o,i)=>`<button class="qopt" data-i="${i}"><span class="key">${keys[i]}</span><span>${o}</span></button>`).join("")}
      </div>
      <div class="qfb" id="qfb"></div>
      <div class="q-actions" id="qActs" style="display:none">
        <button class="btn-primary" id="btnQNext">다음 문제 ▶</button>
      </div>
    </div>
  `;
  quizState.answered=false;
  document.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>onAns(parseInt(b.dataset.i,10),b));
  document.getElementById("btnQNext").onclick=nextQ;
}
function onAns(i,btn){
  if(quizState.answered)return;
  quizState.answered=true;
  const ch=CHAPTERS[curCh];
  const q=ch.quiz[quizState.qIdx];
  const correct=(i===q.a);
  const opts=document.querySelectorAll(".qopt");
  opts.forEach(o=>o.classList.add("disabled"));
  // 정답 옵션 하이라이트
  opts[q.a].classList.add("correct");
  if(!correct)btn.classList.add("wrong");

  const fb=document.getElementById("qfb");
  if(correct){
    quizState.correct++;
    quizState.combo++;
    quizState.maxCombo=Math.max(quizState.maxCombo,quizState.combo);
    setStreak(S.streak+1);
    sndCorrect();
    flash("ok");
    confetti(60,{x:btn.getBoundingClientRect().left+btn.offsetWidth/2,y:btn.getBoundingClientRect().top});
    floatText("+10 XP",innerWidth/2,200,"green");
    if(quizState.combo>=2){
      const cb=document.getElementById("combo");
      document.getElementById("comboNum").textContent=quizState.combo;
      cb.className="combo show";
      // 재발사
      void cb.offsetWidth;cb.style.animation="";
      sndCombo(quizState.combo);
      if(quizState.combo===5||quizState.combo===10){
        confetti(150,{colors:["#ff4ecd","#ffd54a"]});
        sndApplause();
      }
    }
    fb.className="qfb show ok";
    fb.innerHTML=`<div class="h">🎉 정답이야! ${quizState.combo>=2?` (${quizState.combo}콤보!)`:""}</div><div class="why">${q.why||""}</div>`;
  }else{
    document.getElementById("qcard").classList.add("shake");
    setTimeout(()=>document.getElementById("qcard").classList.remove("shake"),520);
    setStreak(0);
    quizState.combo=0;
    document.getElementById("combo").classList.remove("show");
    sndWrong();
    flash("no");
    fb.className="qfb show no";
    fb.innerHTML=`<div class="h">❌ 아쉬워! 다시 봐볼까?</div><div class="ans">정답: ${["A","B","C","D"][q.a]}. ${q.opts[q.a]}</div><div class="why">${q.why||""}</div>`;
  }
  document.getElementById("qActs").style.display="flex";
  // last?
  if(quizState.qIdx===ch.quiz.length-1){
    document.getElementById("btnQNext").textContent="결과 보기 🏆";
  }
}
function nextQ(){
  const ch=CHAPTERS[curCh];
  if(quizState.qIdx<ch.quiz.length-1){
    quizState.qIdx++;
    renderQ();
    sndClick();
  }else{
    finishQuiz();
  }
}
document.getElementById("btnBackQuiz").onclick=()=>{
  if(confirm("퀴즈를 그만둘까? 진도는 저장 안 돼.")){
    sndClick();show("screenWorld");
  }
};

/* ---------- 결과 ---------- */
function finishQuiz(){
  const ch=CHAPTERS[curCh];
  const total=ch.quiz.length;
  const correct=quizState.correct;
  const pct=correct/total;
  // 별 계산
  let stars=0;
  if(pct>=1)stars=3;
  else if(pct>=0.8)stars=3;
  else if(pct>=0.6)stars=2;
  else if(pct>=0.4)stars=1;
  else stars=0;

  // XP / 골드
  const xp = correct*10 + (stars===3?20:0) + quizState.maxCombo*2;
  const gold = correct*5 + stars*15;

  // 상태 저장
  const prev=S.stages[curCh];
  prev.best=Math.max(prev.best,correct);
  prev.stars=Math.max(prev.stars,stars);
  if(stars>=1)prev.cleared=true;
  save();

  // 화면
  show("screenResult");
  const titles=["힘내!","좋아!","멋져!","완벽해!"];
  const titleIdx=stars>=3?3:(stars>=2?2:(stars>=1?1:0));
  document.getElementById("resTitle").textContent=titles[titleIdx]+(stars===3?" 🌟":"");
  // 별 애니메이션
  document.querySelectorAll("#resStars span").forEach((s,i)=>{
    s.classList.toggle("on",i<stars);
  });
  document.getElementById("resCorrect").textContent=correct;
  document.getElementById("resTotal").textContent=total;
  document.getElementById("resXp").textContent=xp;
  document.getElementById("resGold").textContent=gold;

  // 폭죽
  if(stars>=2){confetti(200);sndApplause()}
  else if(stars===1){confetti(80)}

  gainXp(xp);
  gainGold(gold);

  // 배지 검사
  const newOnes=checkBadges({perfect:correct===total,combo:quizState.maxCombo});
  const badgeBox=document.getElementById("resBadge");
  badgeBox.innerHTML="";
  if(newOnes.length){
    newOnes.forEach(b=>{
      const e=document.createElement("div");
      e.className="new-badge";
      e.innerHTML=`<span class="ic">${b.ic}</span><div><div class="nm">새 배지: ${b.nm}</div><div class="ds">${b.ds}</div></div>`;
      badgeBox.appendChild(e);
    });
    sndUnlock();
    setTimeout(()=>confetti(100,{colors:["#ffd54a","#ff7e3a"]}),300);
  }

  renderStages();renderBadges();
}
document.getElementById("btnNextStage").onclick=()=>{
  if(curCh<11){
    enterLesson(curCh+1);
  }else{
    show("screenWorld");
    if(S.stages.every(s=>s.cleared)){
      setTimeout(()=>{
        confetti(280,{colors:["#ffd54a","#ff7e3a","#ff4ecd","#7c5bff"]});
        sndApplause();
        toast("👑 영문법 마스터 달성! 축하해!");
      },300);
    }
  }
  sndClick();
};
document.getElementById("btnRetry").onclick=()=>{startQuiz();sndClick()};
document.getElementById("btnHome").onclick=()=>{show("screenWorld");sndClick()};

/* ---------- 메뉴 버튼 ---------- */
document.getElementById("btnContinue").onclick=()=>{
  // 가장 가까운 미클리어 단원
  const idx=S.stages.findIndex(s=>!s.cleared);
  enterLesson(idx===-1?0:idx);
};
document.getElementById("btnReset").onclick=()=>{
  if(confirm("정말 처음부터 다시 시작할래? 모든 진도가 사라져!")){
    S=defaultState();save();refreshHUD();renderStages();renderBadges();
    toast("🔄 처음부터 시작!");
  }
};
document.getElementById("btnMute").onclick=()=>{
  S.mute=!S.mute;refreshHUD();save();
  toast(S.mute?"🔇 음소거":"🔊 소리 켜짐");
};

/* ---------- 키보드 ---------- */
document.addEventListener("keydown",e=>{
  const lessonOn=document.getElementById("screenLesson").classList.contains("active");
  const quizOn=document.getElementById("screenQuiz").classList.contains("active");
  if(lessonOn){
    if(e.key==="ArrowRight")document.getElementById("btnNext").click();
    if(e.key==="ArrowLeft")document.getElementById("btnPrev").click();
  }
  if(quizOn){
    const k=e.key.toUpperCase();
    if(["A","B","C","D"].includes(k)){
      const opts=document.querySelectorAll(".qopt");
      const i={A:0,B:1,C:2,D:3}[k];
      if(opts[i])opts[i].click();
    }
    if(e.key==="Enter"){
      const btn=document.getElementById("btnQNext");
      if(btn&&btn.offsetParent!==null)btn.click();
    }
  }
});

/* ---------- 초기화 ---------- */
refreshHUD();renderStages();renderBadges();

// 스플래시 자동 종료
setTimeout(()=>document.getElementById("splash").classList.add("hide"),1300);
// 사용자 첫 클릭 후 audio context 깨우기
document.body.addEventListener("click",()=>{const c=ac();if(c&&c.state==="suspended")c.resume()},{once:true});

// 첫 방문 안내
if(!localStorage.getItem("gqVisited")){
  localStorage.setItem("gqVisited","1");
  setTimeout(()=>toast("🎮 스테이지 1부터 시작해보자! 화이팅!"),1800);
}
